<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Portfolio Website</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <div id="header">
    <div class="container">
      <nav>
        <ul>
          <li><a href="#header">Home</a></li>
          <li><a href="#About">About</a></li>
          <li><a href="#projects">Apps</a></li>
          <li><a href="#involvement">Involvement</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
      <div class="header-text">
        <h1>Hi, I'm <span>Isaac Keninger</span></h1>
        <p>Student at <a href="https://www.drake.edu/" target="_blank"
            style="color: #0055A3; text-decoration: none;">Drake University</a></p>
        <p class="tagline">Aspiring software engineer, making software a little more interesting.</p>
      </div>
      <div class="hero-wave">
        <svg viewBox="0 0 400 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path class="wave-path" d="M0,10 C50,0 100,20 150,10 C200,0 250,20 300,10 C350,0 400,20 400,10" fill="none" stroke="rgba(33,34,34,0.3)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="hero-cards">
        <a href="#projects" class="hero-card">
          <div class="hero-card-text">
            <span class="hero-card-label">Creations</span>
            <span class="hero-card-sub">Apps & software</span>
          </div>
          <img src="Media/CitySounds/across_the_atlantic.jpg" alt="Creations" class="hero-card-img" />
        </a>
        <a href="#photography" class="hero-card">
          <div class="hero-card-text">
            <span class="hero-card-label">Photography</span>
            <span class="hero-card-sub">My shots</span>
          </div>
          <img src="https://placehold.co/300x400" alt="Photography" class="hero-card-img" />
        </a>
        <a href="#contact" class="hero-card">
          <div class="hero-card-text">
            <span class="hero-card-label">Contact</span>
            <span class="hero-card-sub">Github, Linkedin, etc...</span>
          </div>
          <img src="https://placehold.co/300x400" alt="Contact" class="hero-card-img" />
        </a>
      </div>
      <a href="#About" class="scroll-arrow">
        <i class="fas fa-chevron-down"></i>
      </a>
    </div>
  </div>


</body>

</html>
